<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="container">
    <div class="form-container" id="loginForm">
      <h2>Login</h2>
      <form id="loginFormElement">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="btn">Login</button>
      </form>
      <p class="switch-form">Don't have an account? <a href="#" id="showRegister">Register</a></p>
    </div>

    <div class="form-container hidden" id="registerForm">
      <h2>Register</h2>
      <form id="registerFormElement">
        <div class="form-group">
          <label for="registerName">Name</label>
          <input type="text" id="registerName" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" placeholder="Enter your password (min 6 chars)" required minlength="6">
        </div>
        <div class="form-group">
          <label for="registerConfirmPassword">Confirm Password</label>
          <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required>
        </div>
        <div class="error-message" id="registerError"></div>
        <button type="submit" class="btn">Register</button>
      </form>
      <p class="switch-form">Already have an account? <a href="#" id="showLogin">Login</a></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
