<nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
        </div>
        <span class="text-xl font-bold text-gray-900">LearnHub</span>
      </div>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-8">
        @for (link of navLinks; track link.label) {
          <a [href]="link.href" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Desktop Auth -->
      <div class="hidden md:flex items-center gap-3">
        <a routerLink="/login" class="px-4 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 transition-colors">
          Log in
        </a>
        <a routerLink="/register" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
          Get Started
        </a>
      </div>

      <!-- Mobile menu button -->
      <button class="md:hidden p-2 rounded-md text-gray-600 hover:text-gray-900" (click)="toggleMobileMenu()">
        @if (isMobileMenuOpen()) {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        }
      </button>
    </div>

    <!-- Mobile menu -->
    @if (isMobileMenuOpen()) {
      <div class="md:hidden border-t border-gray-200 py-4">
        <div class="flex flex-col gap-3">
          @for (link of navLinks; track link.label) {
            <a [href]="link.href" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-md transition-colors"
               (click)="toggleMobileMenu()">
              {{ link.label }}
            </a>
          }
          <div class="flex flex-col gap-2 mt-3 pt-3 border-t border-gray-200">
            <a routerLink="/login" class="px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 rounded-md text-left">
              Log in
            </a>
            <a routerLink="/register" class="px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 text-center">
              Get Started
            </a>
          </div>
        </div>
      </div>
    }
  </div>
</nav>
